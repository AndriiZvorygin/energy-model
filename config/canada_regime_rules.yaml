      "expectedSymptoms": ["physical_tightening"], "conflictingSymptoms": [],
      "predecessors": ["A", "H"], "successors": ["C", "D"], "exceptionalJumpConditions": ["Documented global supply shock"]
    },
    {
      "id": "C", "name": "Consumer affordability stress", "requiredLayers": ["pricing", "consumer", "finance"],
      "indicatorEvidence": [
        {"indicator": "canada_real_wti_cad_yoy", "expectedDirection": "high", "layer": "pricing"},
        {"indicator": "canada_energy_cpi_yoy", "expectedDirection": "high", "layer": "consumer"},
        {"indicator": "canada_gasoline_cpi_yoy", "expectedDirection": "high", "layer": "consumer"},
        {"indicator": "canada_policy_rate", "expectedDirection": "high", "layer": "finance"},
        {"indicator": "canada_household_debt_service_ratio", "expectedDirection": "high", "layer": "finance"}
