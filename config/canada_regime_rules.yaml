      "expectedSymptoms": ["manufacturing_output_transmission", "labour_weakening"], "conflictingSymptoms": ["physical_tightening"],
      "predecessors": ["C", "D", "F"], "successors": ["H"], "exceptionalJumpConditions": ["Pandemic or abrupt external demand shock"]
