{
  "version": "0.1.0",
  "scope": "Canadian energy-economic conditions with global oil-market and global-liquidity inputs.",
  "settings": {
    "minimumEvidenceCoverage": 0.70,
    "minimumTopRegimeScore": 0.60,
    "minimumMargin": 0.10,
    "confirmedMonthlyPersistence": 2,
    "layerContributionCap": 0.30
  },
  "regimes": [
    {
      "id": "A", "name": "Broad expansion", "requiredLayers": ["output", "labour", "resource"],
