        {"indicator": "canada_real_gdp_growth", "expectedDirection": "low", "layer": "output"},
        {"indicator": "canada_manufacturing_gdp_growth", "expectedDirection": "low", "layer": "output"},
        {"indicator": "canada_retail_gdp_growth", "expectedDirection": "low", "layer": "output"},
        {"indicator": "canada_employment_relative_population_growth", "expectedDirection": "low", "layer": "labour"},
        {"indicator": "canada_policy_rate", "expectedDirection": "high", "layer": "finance"}
      ],
      "expectedSymptoms": ["manufacturing_output_transmission"], "conflictingSymptoms": [],
      "predecessors": ["C"], "successors": ["G", "F"], "exceptionalJumpConditions": []
