      "indicatorEvidence": [
        {"indicator": "canada_real_gdp_growth", "expectedDirection": "low", "layer": "output"},
        {"indicator": "canada_retail_gdp_growth", "expectedDirection": "low", "layer": "output"},
        {"indicator": "canada_unemployment_rate", "expectedDirection": "high", "layer": "labour"},
        {"indicator": "canada_employment_rate", "expectedDirection": "low", "layer": "labour"},
        {"indicator": "global_wti_yoy", "expectedDirection": "low", "layer": "pricing"}
