        {"indicator": "canada_manufacturing_gdp_growth", "expectedDirection": "high", "layer": "output"},
        {"indicator": "canada_employment_rate", "expectedDirection": "high", "layer": "labour"},
        {"indicator": "canada_unemployment_rate", "expectedDirection": "low", "layer": "labour"},
        {"indicator": "canada_mining_oil_gas_gdp_growth", "expectedDirection": "high", "layer": "resource"}
      ],
      "expectedSymptoms": [], "conflictingSymptoms": ["manufacturing_output_transmission", "labour_weakening"],
      "predecessors": ["H"], "successors": ["B", "C", "E"], "exceptionalJumpConditions": []
    },
    {
      "id": "B", "name": "Physical oil-market tightening", "requiredLayers": ["physical", "pricing"],
      "indicatorEvidence": [
        {"indicator": "canada_crude_inventory", "expectedDirection": "low", "layer": "physical"},
