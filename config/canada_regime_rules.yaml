    {
      "id": "F", "name": "Resource-producing-region contraction", "requiredLayers": ["alberta", "resource", "external"],
      "indicatorEvidence": [
        {"indicator": "alberta_crude_production_growth", "expectedDirection": "low", "layer": "alberta"},
