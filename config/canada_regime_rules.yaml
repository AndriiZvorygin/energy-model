    {
      "id": "H", "name": "Recovery or renewed tightening", "requiredLayers": ["output", "labour", "physical"],
      "indicatorEvidence": [
        {"indicator": "canada_real_gdp_growth", "expectedDirection": "rising", "layer": "output"},
        {"indicator": "canada_manufacturing_gdp_growth", "expectedDirection": "rising", "layer": "output"},
        {"indicator": "canada_employment_rate", "expectedDirection": "rising", "layer": "labour"},
        {"indicator": "canada_unemployment_rate", "expectedDirection": "falling", "layer": "labour"},
        {"indicator": "canada_refinery_input_growth", "expectedDirection": "rising", "layer": "physical"}
      ],
      "expectedSymptoms": [], "conflictingSymptoms": ["labour_weakening"],
      "predecessors": ["F", "G"], "successors": ["A", "B", "C", "E"], "exceptionalJumpConditions": ["Policy-supported reopening"]
